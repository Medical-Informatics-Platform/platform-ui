version: 2
updates:
  # Keep SHA-pinned actions in workflows up to date (updates the pin and its
  # version comment). Renovate is scoped to the setup scripts only, so the two
  # bots don't overlap (see renovate.json).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # One combined PR for all action bumps instead of one PR per action
    groups:
      github-actions:
        patterns:
          - "*"
    # Same 72h cooldown as the scanners: never propose a release younger
    # than 3 days, so yanked or compromised releases never reach a PR
    cooldown:
      default-days: 3
    labels:
      - "dependencies"
