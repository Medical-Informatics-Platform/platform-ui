<div class="notebook-container">
    @if (isLoading()) {
    <div class="loading-overlay">
        <p class="loading-message">{{ loadingMessage() }}</p>
        @if (spawnError()) {
        <p class="loading-error">{{ spawnError() }}</p>
        <button type="button" class="notebook-retry-btn" (click)="retrySpawn()">
            Try again
        </button>
        } @else {
        <p class="loading-subtext">This usually takes 30–60 seconds.</p>
        }
    </div>
    }

    @if (jupyterUrl()) {
    <iframe [src]="jupyterUrl()" (load)="onLoad()" title="Jupyter Notebook" class="jupyter-iframe">
    </iframe>
    }
</div>
