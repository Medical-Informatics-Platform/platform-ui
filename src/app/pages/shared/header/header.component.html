<header class="header header--transparent">
  <!-- Logo -->
  <a class="branding" routerLink="/experiments-dashboard" (click)="goHome($event)" aria-label="Go to home">
    <img src="assets/mip-logo-short.png" alt="MIP Logo" class="logo" />
  </a>

  <!-- Theme Toggle + User Icon -->
  <div class="header-actions">
    @if (runtimeEnv.notebookEnabled && isLoggedIn()) {
    <nav class="header-nav header-nav--actions" aria-label="Primary">
      <a
        routerLink="/notebook"
        routerLinkActive="header-nav-link--active"
        class="header-nav-link header-nav-link--notebook"
        [class.header-nav-link--discover]="!notebookNav.hasVisited()"
        aria-label="Jupyter Notebook, powered by AI agents"
      >
        <span class="header-nav-link__text">
          <span class="header-nav-link__title">Jupyter Notebook</span>
          <span class="header-nav-link__subtitle">Powered by AI agents</span>
        </span>
        <img src="assets/notebook-ai-icon.svg" alt="" class="header-nav-link__icon" width="28" height="28" />
      </a>
    </nav>
  }

    @if (showGuideSlot()) {
    <div class="header-guide-slot" aria-hidden="true"></div>
    }

    <div class="user-icon">
      @if (isLoggedIn()) {
      <!-- LOGGED IN: go to account -->
      <a class="sign-in-btn" routerLink="/account">
        <span class="account-guide-target" data-guide="header-account">
          <img src="assets/user-icon.png" alt="User Picture" class="account-picture" />
        </span>
      </a>
      } @else {
      <!-- LOGGED OUT: trigger login -->
      <button class="sign-in-btn" (click)="login()">
        <span class="account-guide-target" data-guide="header-account">
          <img src="assets/grey-avatar.png" alt="Sign In" class="account-picture" />
        </span>
      </button>
      }
    </div>
  </div>
</header>
