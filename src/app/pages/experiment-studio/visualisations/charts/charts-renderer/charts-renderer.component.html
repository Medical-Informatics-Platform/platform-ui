@if(charts().length) {
<div>
  @for(chart of themedCharts; track chart) {
  <div class="chart-container">
    <div echarts [options]="chart" [initOpts]="{ renderer: 'canvas' }" class="chart"
      [style.height.px]="chartHeight(chart)"></div>
  </div>
  }
</div>
} @else {
<ng-template #noCharts>
  <p>No charts to display.</p>
</ng-template>
}
