@if (tableSpec()) {
<div class="ar-container">
  @for (table of tableSpec(); track table) {
  <div class="ar-card" [class.ar-card--full]="!isCompactTable(table)" [class.ar-card--compact]="isCompactTable(table)">
    <div class="ar-header">
      <div class="ar-title">{{ table.title || 'Result Table' }}</div>
      <button class="ar-export-btn" (click)="exportToCSV(table)" title="Export to CSV">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" x2="12" y1="15" y2="3" />
        </svg>
        <span>Export CSV</span>
      </button>
    </div>

    <div class="ar-table-wrapper">
      <table class="ar-table">
        <thead>
          <tr>
            @for (col of table.columns; track col) {
            <th>{{ col }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (row of table.rows; track row) {
          <tr>
            @for (cell of row; track cell) {
            <td>{{ formatValue(cell) }}</td>
            }
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
  }
</div>
}
