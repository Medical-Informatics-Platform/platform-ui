<div class="experiment-studio-page full-bleed" id="studio-top">
  @if (errorMessage()) {
  <div class="global-error-banner" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="banner-content">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{ errorMessage() }}</span>
    </div>
    <button type="button" class="banner-close" (click)="dismissError()">
      &times;
    </button>
  </div>
  }



  <div class="studio-inner studio-layout">
    <nav class="studio-sidenav" [class.is-collapsed]="sidebarCollapsed()" aria-label="Studio navigation">
      <div class="studio-rail-context">
        <div class="studio-rail-context-title">Experiment Studio</div>
        <a class="studio-rail-context-link" routerLink="/experiments-dashboard"
          [attr.title]="sidebarCollapsed() ? 'Back to dashboard' : null">
          <i class="fas fa-arrow-left"></i>
          <span class="studio-rail-context-text">Back to dashboard</span>
        </a>
      </div>



      <div class="studio-rail-scroll">
        <div class="studio-rail-section">
          <div class="studio-rail-section-title"
            [class.is-active]="activeSection() === 'variables-top' || activeSection() === 'data-model-visualization'">
            Studio
          </div>
          <a routerLink="." [fragment]="'studio-top'" queryParamsHandling="preserve" class="studio-rail-item"
            [class.is-active]="activeSection() === 'variables-top'"
            [attr.aria-current]="activeSection() === 'variables-top' ? 'page' : null">
            <span class="studio-rail-icon"><i class="fas fa-database"></i></span>
            <span class="studio-rail-label">Datasets & Variables</span>
          </a>
        </div>

        <div class="studio-rail-section">
          <div class="studio-rail-section-title"
            [class.is-active]="activeSection() === 'statistics-section' || activeSection() === 'algorithm-section'">
            Analysis
          </div>
          <a routerLink="." [fragment]="'statistics-section'" queryParamsHandling="preserve" class="studio-rail-item"
            [class.is-active]="activeSection() === 'statistics-section'"
            [attr.aria-current]="activeSection() === 'statistics-section' ? 'page' : null">
            <span class="studio-rail-icon"><i class="fas fa-chart-line"></i></span>
            <span class="studio-rail-label">Descriptive statistics</span>
          </a>
          <a routerLink="." [fragment]="'algorithm-section'" queryParamsHandling="preserve" class="studio-rail-item"
            [class.is-active]="activeSection() === 'algorithm-section'"
            [attr.aria-current]="activeSection() === 'algorithm-section' ? 'page' : null">
            <span class="studio-rail-icon"><i class="fas fa-cogs"></i></span>
            <span class="studio-rail-label">Algorithm</span>
          </a>
        </div>
      </div>

    </nav>

    <div class="studio-main" [class.sidebar-collapsed]="sidebarCollapsed()">
      <!-- TOP: Variables -->
      <section class="studio-section studio-section--variables">
        <app-variables-panel></app-variables-panel>
      </section>

      <section class="studio-section studio-section--statistics" id="statistics-section">
        <app-statistic-analysis-panel></app-statistic-analysis-panel>
      </section>

      <!-- BOTTOM: Algorithm -->
      <section class="studio-section studio-section--algorithm" id="algorithm-section">
        <app-algorithm-panel></app-algorithm-panel>
      </section>
    </div>
  </div>

  @if (expStudioService.isFilterConfigOpen()) {
  <app-filter-config-modal (closeModal)="expStudioService.toggleFilterConfigModal(false)"
    [filterLogic]="expStudioService.filterLogic()"></app-filter-config-modal>
  }
</div>
