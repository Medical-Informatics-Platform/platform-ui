<div class="results-list space-y-6" data-guide="results-list">

  @if (errorMessage()) {
  <div class="algorithm-error">
    <strong>Algorithm error:</strong>
    <span>{{ errorMessage() }}</span>
  </div>
  }

  @if (renderedCharts().length > 0) {
  <section class="results-primary-visual gen-charts" aria-labelledby="results-chart-heading">
    <header class="results-section-intro">
      <h3 id="results-chart-heading" class="results-section-heading">Effect estimates</h3>
      <p class="results-section-lead">Primary view for comparing factors. Tables below list the same estimates with exact values.</p>
    </header>
    <app-chart-renderer [charts]="renderedCharts()" />
  </section>
  }

  @if (isRenderable()) {
  <section class="results-detail-section" [class.results-detail-section--with-chart]="renderedCharts().length > 0"
    aria-labelledby="results-detail-heading">
    @if (renderedCharts().length > 0) {
    <header class="results-section-intro results-section-intro--compact">
      <h3 id="results-detail-heading" class="results-section-heading">Detailed results</h3>
    </header>
    }
    <app-auto-renderer [value]="mappedResult()" [algorithm]="algorithm()" [labelMap]="labelMap()" [enumMaps]="enumMaps()"
      [yVar]="yVar()" [xVar]="xVar()" [fallbackTitle]="fallbackResultTitle()" />
  </section>
  }

  <!-- Raw fallback -->
  <!-- <details class="text-xs text-gray-500 mt-4">
    <summary class="cursor-pointer">View Raw JSON</summary>
    <pre class="bg-gray-100 rounded p-2 overflow-auto">
      {{ result() | json }}
    </pre>
  </details> -->

</div>
