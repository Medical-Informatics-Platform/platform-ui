<div class="parameters-section">
  <!-- Header -->
  <div class="parameters-header">
    <label>Parameters</label>
  </div>

  <!-- Content -->
  <div class="parameters-content">
    <!-- Variables Section -->
    <div class="section-container">
      <div class="panel-controls">
        <button type="button" class="panel-title panel-title--variable"
          data-guide="guide-add-variable"
          [class.pulse-hint--variable]="isNodeSelectedAndNotInList('variables')" [disabled]="!hasSelectedDatasets"
          (click)="addVariable()">
          <span>+ Variables</span>
          <span class="counter counter--inline counter--variable">{{ variables().length }}</span>
        </button>
        @if (variables().length > 0) {
        <button class="bin-btn" (click)="clearList('variables')">
          <i class="fa fa-trash"></i>
        </button>
        }
      </div>

      <div class="panel-container">
        <div class="panel">
          <ul class="horizontal-list" cdkDropList #varList="cdkDropList" [cdkDropListData]="variables()"
            [cdkDropListConnectedTo]="[covList]" (cdkDropListDropped)="drop($event, 'variables')">
            @for (variable of variables(); track variable) {
            <li class="horizontal-item" [ngClass]="{
                'highlighted-variable': selectedNode?.code === variable.code
              }" cdkDrag (click)="onVariableClick(variable)">
              <div class="variable-info">
                <span class="variable-name">{{ variable.label }}</span>
                <span class="variable-type">type: {{ variable.type }}</span>
              </div>
              <button class="remove-btn" (click)="
                  removeItem(variable, 'variables'); $event.stopPropagation()
                ">
                ✖
              </button>
            </li>
            }
          </ul>
        </div>
      </div>
    </div>

    <!-- Covariates Section -->
    <div class="section-container">
      <div class="panel-controls">
        <button type="button" class="panel-title panel-title--covariate"
          data-guide="guide-add-covariate"
          [class.pulse-hint--covariate]="isNodeSelectedAndNotInList('covariates')" [disabled]="!hasSelectedDatasets"
          (click)="addCovariate()">
          <span>+ Covariates</span>
          <span class="counter counter--inline counter--covariate">{{ covariates().length }}</span>
        </button>
        @if (covariates().length > 0) {
        <button class="bin-btn" (click)="clearList('covariates')">
          <i class="fa fa-trash"></i>
        </button>
        }
      </div>

      <div class="panel-container">
        <div class="panel">
          <ul class="horizontal-list" cdkDropList #covList="cdkDropList" [cdkDropListData]="covariates()"
            [cdkDropListConnectedTo]="[varList]" (cdkDropListDropped)="drop($event, 'covariates')">
            @for (covariate of covariates(); track covariate) {
            <li class="horizontal-item" [ngClass]="{
                'highlighted-variable highlighted-covariate':
                  selectedNode?.code === covariate.code
              }" cdkDrag (click)="onVariableClick(covariate)">
              <div class="variable-info">
                <span class="variable-name">{{ covariate.label }}</span>
                <span class="variable-type">type: {{ covariate.type }}</span>
              </div>
              <button class="remove-btn" (click)="
                  removeItem(covariate, 'covariates'); $event.stopPropagation()
                ">
                ✖
              </button>
            </li>
            }
          </ul>
        </div>
      </div>
    </div>

  </div>
</div>
